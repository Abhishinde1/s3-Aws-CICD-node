version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - npm install
  
  pre_build:
    commands:
      - echo "Running tests..."
      - npm test
  
  build:
    commands:
      - echo "Building the application..."
      - npm run build

artifacts:
  files:
    - 'dist/**/*'
    - 'node_modules/**/*'
    - 'package.json'